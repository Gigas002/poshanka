# Poshanka subscriber configuration — placement, layer shell, and provider wiring.
# Queue policy, timeouts, and gesture hooks belong in your notification daemon config.

[paths]
theme = "theme.toml"
overrides = [
    "urgency/low/config.toml",
    "urgency/critical/config.toml",
    "apps/some_app/config.toml",
]

[provider]
exec = "scripts/notred-subscribe.sh"
command = "notredctl"
# socket = ""

[stack]
# gap between stacked notification surfaces (px)
gap = 10

[placement]
anchor = "bottom-right"
# margin outside the whole stack on that corner (px)
margin = 0

[layer]
# background, bottom, top, overlay
layer = "overlay"
output = ""
